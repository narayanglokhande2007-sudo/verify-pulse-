name: Daily Scam Scraper

on:
  schedule:
    - cron: '0 */12 * * *'   # har 12 ghante
  workflow_dispatch:          # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run scraper
        run: node pipeline/scraper.js

      - name: Commit and push updated scam data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/daily-data/latest_scams.json
          git diff --staged --quiet || (git commit -m "🤖 daily scam update" && git push)
