  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyPulse - AI Security Suite</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
        }
        .lang-btn {
            background: #2d3748;
            border: 1px solid #4a5568;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .lang-btn:hover {
            background: #4a5568;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 20px 0;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: #a0aec0;
            margin-top: 8px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 20px 0;
            border-bottom: 1px solid #2d3748;
            padding-bottom: 10px;
        }
        .tab {
            background: transparent;
            border: none;
            color: #a0aec0;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .tab.active {
            background: #4a5568;
            color: white;
        }
        .tab:hover:not(.active) {
            background: #2d3748;
            color: #e2e8f0;
        }
        .tab-content {
            display: none;
            margin-top: 20px;
        }
        .tab-content.active {
            display: block;
        }
        textarea, input {
            width: 100%;
            padding: 15px;
            border: 1px solid #4a5568;
            background: #1a202c;
            color: white;
            border-radius: 12px;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 15px;
        }
        .btn-verify {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-clear {
            background: #2d3748;
            color: white;
            border: 1px solid #4a5568;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-verify:hover, .btn-clear:hover {
            transform: scale(1.02);
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #1a202c;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        .verdict {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .confidence {
            margin: 10px 0;
        }
        .confidence-bar {
            background: #2d3748;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        .confidence-fill {
            background: linear-gradient(90deg, #48bb78, #38a169);
            height: 100%;
            width: 0%;
            transition: width 0.5s;
        }
        .analysis, .findings {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #2d3748;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .error {
            color: #fc8181;
        }
        @media (max-width: 600px) {
            .container { padding: 15px; }
            h1 { font-size: 1.8rem; }
            .tab { padding: 8px 12px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align: right;">
            <button id="langToggle" class="lang-btn">🇮🇳 हिन्दी</button>
        </div>
        <header>
            <h1>VerifyPulse</h1>
            <p class="tagline" id="tagline">AI-Powered Cybersecurity & Fact Checking</p>
        </header>

        <div class="tabs" id="tabs">
            <button class="tab active" data-tab="news">📰 News</button>
            <button class="tab" data-tab="url">🔗 URL</button>
            <button class="tab" data-tab="phishing">📧 Phishing</button>
            <button class="tab" data-tab="password">🔐 Password</button>
            <button class="tab" data-tab="scam">⚠️ Scam</button>
        </div>

        <div id="news" class="tab-content active">
            <textarea id="newsInput" rows="4" placeholder="Enter news or claim to verify..."></textarea>
        </div>
        <div id="url" class="tab-content">
            <input type="text" id="urlInput" placeholder="Enter URL to check...">
        </div>
        <div id="phishing" class="tab-content">
            <textarea id="phishInput" rows="4" placeholder="Enter email or SMS content..."></textarea>
        </div>
        <div id="password" class="tab-content">
            <input type="password" id="passInput" placeholder="Enter password to check strength...">
        </div>
        <div id="scam" class="tab-content">
            <textarea id="scamInput" rows="4" placeholder="Enter message to check for scam..."></textarea>
        </div>

        <div class="button-group">
            <button id="verifyBtn" class="btn-verify">Verify</button>
            <button id="clearBtn" class="btn-clear">Clear</button>
        </div>

        <div id="result" class="result-box" style="display: none;">
            <div class="verdict" id="verdict"></div>
            <div class="confidence" id="confidence"></div>
            <div class="confidence-bar"><div class="confidence-fill" id="confidenceFill"></div></div>
            <div class="analysis" id="analysis"></div>
            <div class="findings" id="findings"></div>
        </div>
    </div>

    <script>
        // ---------- TRANSLATIONS (Hindi Support) ----------
        const translations = {
            en: {
                tagline: "AI-Powered Cybersecurity & Fact Checking",
                tabs: ["📰 News", "🔗 URL", "📧 Phishing", "🔐 Password", "⚠️ Scam"],
                newsPlaceholder: "Enter news or claim to verify...",
                urlPlaceholder: "Enter URL to check...",
                phishPlaceholder: "Enter email or SMS content...",
                passPlaceholder: "Enter password to check strength...",
                scamPlaceholder: "Enter message to check for scam...",
                verifyBtn: "Verify",
                clearBtn: "Clear",
                verdict: "Verdict:",
                confidence: "Confidence:",
                analysis: "Analysis:",
                findings: "Key Findings:",
                loading: "Analyzing... Please wait.",
                error: "Error occurred. Please try again."
            },
            hi: {
                tagline: "AI-संचालित साइबर सुरक्षा और तथ्य जांच",
                tabs: ["📰 समाचार", "🔗 लिंक", "📧 फ़िशिंग", "🔐 पासवर्ड", "⚠️ स्कैम"],
                newsPlaceholder: "जांचने के लिए समाचार या दावा लिखें...",
                urlPlaceholder: "जांचने के लिए URL लिखें...",
                phishPlaceholder: "ईमेल या एसएमएस कंटेंट लिखें...",
                passPlaceholder: "पासवर्ड की सुरक्षा जांचने के लिए लिखें...",
                scamPlaceholder: "स्कैम जांचने के लिए संदेश लिखें...",
                verifyBtn: "जांच करें",
                clearBtn: "साफ़ करें",
                verdict: "परिणाम:",
                confidence: "विश्वस्तता:",
                analysis: "विश्लेषण:",
                findings: "मुख्य निष्कर्ष:",
                loading: "विश्लेषण हो रहा है... कृपया प्रतीक्षा करें।",
                error: "त्रुटि हुई। कृपया पुनः प्रयास करें।"
            }
        };

        let currentLang = 'en';

        function updateLanguage() {
            document.getElementById('tagline').innerText = translations[currentLang].tagline;
            const tabBtns = document.querySelectorAll('.tab');
            tabBtns.forEach((btn, idx) => {
                if(translations[currentLang].tabs[idx]) btn.innerText = translations[currentLang].tabs[idx];
            });
            document.getElementById('newsInput').placeholder = translations[currentLang].newsPlaceholder;
            document.getElementById('urlInput').placeholder = translations[currentLang].urlPlaceholder;
            document.getElementById('phishInput').placeholder = translations[currentLang].phishPlaceholder;
            document.getElementById('passInput').placeholder = translations[currentLang].passPlaceholder;
            document.getElementById('scamInput').placeholder = translations[currentLang].scamPlaceholder;
            document.getElementById('verifyBtn').innerText = translations[currentLang].verifyBtn;
            document.getElementById('clearBtn').innerText = translations[currentLang].clearBtn;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'hi' : 'en';
            document.getElementById('langToggle').innerText = currentLang === 'en' ? '🇮🇳 हिन्दी' : '🇬🇧 English';
            updateLanguage();
        });

        updateLanguage();

        // ---------- TAB SWITCHING ----------
        const tabs = document.querySelectorAll('.tab');
        const contents = document.querySelectorAll('.tab-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                const tabId = tab.getAttribute('data-tab');
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                contents.forEach(content => content.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.getElementById('result').style.display = 'none';
            });
        });

        // ---------- CLEAR BUTTON ----------
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('newsInput').value = '';
            document.getElementById('urlInput').value = '';
            document.getElementById('phishInput').value = '';
            document.getElementById('passInput').value = '';
            document.getElementById('scamInput').value = '';
            document.getElementById('result').style.display = 'none';
        });

        // ---------- VERIFY FUNCTION ----------
        document.getElementById('verifyBtn').addEventListener('click', async () => {
            const activeTab = document.querySelector('.tab.active').getAttribute('data-tab');
            let text = '';
            
            if(activeTab === 'news') text = document.getElementById('newsInput').value;
            else if(activeTab === 'url') text = document.getElementById('urlInput').value;
            else if(activeTab === 'phishing') text = document.getElementById('phishInput').value;
            else if(activeTab === 'password') text = document.getElementById('passInput').value;
            else if(activeTab === 'scam') text = document.getElementById('scamInput').value;

            if(!text.trim()) {
                alert(currentLang === 'en' ? 'Please enter something to verify.' : 'कृपया कुछ लिखें।');
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            document.getElementById('verdict').innerHTML = translations[currentLang].loading;
            document.getElementById('confidence').innerHTML = '';
            document.getElementById('analysis').innerHTML = '';
            document.getElementById('findings').innerHTML = '';
            document.getElementById('confidenceFill').style.width = '0%';

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        checkType: activeTab,
                        language: currentLang
                    })
                });
                const data = await response.json();
                
                document.getElementById('verdict').innerHTML = `${translations[currentLang].verdict} ${data.verdict || 'UNCERTAIN'}`;
                document.getElementById('confidence').innerHTML = `${translations[currentLang].confidence} ${data.confidence || 0}%`;
                document.getElementById('confidenceFill').style.width = `${data.confidence || 0}%`;
                document.getElementById('analysis').innerHTML = `<strong>${translations[currentLang].analysis}</strong><br>${data.analysis || 'N/A'}`;
                document.getElementById('findings').innerHTML = `<strong>${translations[currentLang].findings}</strong><br>${data.findings || 'N/A'}`;
            } catch(err) {
                document.getElementById('verdict').innerHTML = translations[currentLang].error;
                document.getElementById('analysis').innerHTML = err.message;
            }
        });
    </script>
</body>
                                                                                                 </html>
