<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VerifyPulse - Debug</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
    body { font-family: Arial; background: #fff; padding: 20px; }
    .container { max-width: 600px; margin: auto; }
    button, .btn { width: 100%; padding: 15px; margin: 5px 0; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn-clear { background: transparent; border: 2px solid #2563eb; color: #2563eb; }
    textarea, input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; }
    .verdict-box { padding: 15px; border-radius: 8px; margin: 10px 0; text-align: center; color: white; }
    .verdict-safe { background: #22c55e; }
    .result { display: none; margin-top: 15px; }
    .loading { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>⚡ VerifyPulse (Debug)</h1>
  <button id="debugBtn">Test JavaScript (Click me first)</button>
  <hr>
  <input type="text" id="urlInput" placeholder="Paste any link here...">
  <button id="scanUrlBtn">🔍 Scan URL</button>
  <div class="loading" id="urlLoading">Scanning...</div>
  <div class="result" id="urlResult"></div>
</div>

<script>
  // Debug button - यह click होना ही चाहिए
  document.getElementById('debugBtn').onclick = function() {
    alert('✅ JavaScript is working! Touch/click is fine.');
  };

  // Real scan function
  document.getElementById('scanUrlBtn').onclick = async function() {
    const url = document.getElementById('urlInput').value.trim();
    if (!url) { alert('Please enter a URL'); return; }
    const loading = document.getElementById('urlLoading');
    const resultDiv = document.getElementById('urlResult');
    loading.style.display = 'block';
    resultDiv.style.display = 'none';
    try {
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: url, checkType: 'url' })
      });
      const data = await res.json();
      resultDiv.innerHTML = `<div class="verdict-box verdict-safe"><strong>${data.verdict}</strong><br>Confidence: ${data.confidence}%<br>${data.analysis || ''}</div>`;
      resultDiv.style.display = 'block';
    } catch(e) {
      resultDiv.innerHTML = `<div class="error-box">Error: ${e.message}</div>`;
      resultDiv.style.display = 'block';
    } finally {
      loading.style.display = 'none';
    }
  };
</script>
</body>
</html>
