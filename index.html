<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyPulse - Test</title>
</head>
<body>
    <h1>VerifyPulse Test</h1>
    <textarea id="input" rows="4" cols="40" placeholder="Paste any link or message..."></textarea><br>
    <button onclick="check()">Scan</button>
    <pre id="result"></pre>

    <script>
        async function check() {
            const text = document.getElementById('input').value.trim();
            if (!text) { alert('Please enter something'); return; }
            document.getElementById('result').innerText = 'Scanning...';
            try {
                const res = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, checkType: 'url' })
                });
                const data = await res.json();
                document.getElementById('result').innerText = JSON.stringify(data, null, 2);
            } catch(e) {
                document.getElementById('result').innerText = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
