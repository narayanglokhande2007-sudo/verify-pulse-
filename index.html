<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyPulse - Master Debug Tool</title>
</head>
<body style="font-family:sans-serif; padding:20px;">
    <h2>Master Debug Tool</h2>
    <div id="output"></div>
    <button id="btn1">Test Click Event</button>
    <button id="btn2">Test Touch Event</button>
    <script>
        function showMessage(msg) {
            let out = document.getElementById('output');
            out.innerHTML += `<p>✅ ${new Date().toLocaleTimeString()} - ${msg}</p>`;
        }

        document.getElementById('btn1').onclick = () => { showMessage('Click event fired!'); };
        document.getElementById('btn2').ontouchstart = () => { showMessage('Touchstart event fired!'); };
    </script>
</body>
</html>
