<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VerifyPulse Test</title>
    <style>
        body { background: #fff; color: #000; padding: 20px; font-family: Arial; }
        .tabs { display: flex; gap: 6px; margin-bottom: 15px; }
        .tab { padding: 10px; background: #eee; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }
        .tab.active { background: #2563eb; color: #fff; }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>
    <h1>VerifyPulse Test</h1>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('news', this)">📰 Fake News</button>
        <button class="tab" onclick="switchTab('url', this)">🔗 URL</button>
    </div>
    <div class="section active" id="news-section"><p>News section</p></div>
    <div class="section" id="url-section"><p>URL section</p></div>

    <script>
        function switchTab(tabName, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabName + '-section').classList.add('active');
        }
    </script>
</body>
</html>
