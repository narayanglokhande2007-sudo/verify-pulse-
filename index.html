<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Pulse - Scam Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <div class="max-w-2xl mx-auto p-6">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">Verify Pulse</h1>
            <p class="text-lg text-gray-700 mt-2">Check links, messages, and scams before you trust them.</p>
            <p class="text-sm text-gray-500">Fast. Private. Easy to use.</p>
        </div>

        <!-- Telegram and Chrome -->
        <div class="flex flex-col gap-3 mb-8">
            <button onclick="alert('Telegram bot coming soon!')" class="bg-blue-600 text-white py-3 px-6 rounded-full font-medium flex items-center justify-center gap-2">
                🤖 Try on Telegram
            </button>
            <button onclick="alert('Chrome Extension coming soon!')" class="border border-blue-600 text-blue-600 py-3 px-6 rounded-full font-medium flex items-center justify-center gap-2">
                💻 Chrome Extension (Soon)
            </button>
        </div>

        <!-- Unified Checker -->
        <div class="bg-white rounded-2xl shadow-sm border p-6 mb-8">
            <div class="flex items-center gap-3 mb-4">
                <div class="text-2xl">🔍</div>
                <h2 class="text-2xl font-semibold">Check Messages and Links</h2>
            </div>
            <textarea id="inputText" rows="6" class="w-full p-4 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 resize-y" placeholder="Paste any link, SMS, WhatsApp message, or email here..."></textarea>
            
            <div class="flex gap-3 mt-4">
                <button onclick="checkContent()" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-semibold flex items-center justify-center gap-2">
                    🔍 Check Links and Messages
                </button>
                <button onclick="clearInput()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 py-4 rounded-xl font-semibold">
                    Clear
                </button>
            </div>
        </div>

        <!-- More Tools -->
        <div class="bg-blue-600 text-white rounded-2xl p-4 text-center mb-8 cursor-pointer" onclick="alert('More tools coming soon!')">
            ▼ More Tools
        </div>

        <!-- Recent Scam Alerts -->
        <div class="bg-white rounded-2xl p-6 shadow-sm">
            <h3 class="font-semibold mb-4 flex items-center gap-2">
                <span class="text-red-500">🚨</span> Recent Scam Alerts
            </h3>
            <div class="space-y-4">
                <div class="flex justify-between items-start p-3 bg-yellow-50 rounded-xl">
                    <div>
                        <p class="font-medium">Fake KBC lottery messages on WhatsApp</p>
                    </div>
                    <a href="#" class="text-blue-600 text-sm underline">Try this scam</a>
                </div>
                <div class="flex justify-between items-start p-3 bg-yellow-50 rounded-xl">
                    <div>
                        <p class="font-medium">Fake SBI KYC update SMS - Do not click links</p>
                    </div>
                    <a href="#" class="text-blue-600 text-sm underline">Try this scam</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function checkContent() {
            const text = document.getElementById('inputText').value.trim();
            if (!text) {
                alert('Please paste something to check!');
                return;
            }
            alert('Scanning: ' + text.substring(0, 100) + '...\n\nResult: This looks suspicious. Be careful! (Demo)');
        }

        function clearInput() {
            document.getElementById('inputText').value = '';
        }
    </script>
</body>
</html>
